trigger: none

pool: default

variables:
  WD : '$(System.DefaultWorkingDirectory)/env/dev'
  Sub_Con : '69ba3bc7-f967-4749-bbe8-54cb06e4a54a'
  Svc: 'vicky-service-connection'
  BCRG : 'vivek-rg'
  BC_STG : 'vivek12345stg'
  BC_Cont: 'vivekcon1'
  BC_SF: 'terraform123456_pipline.tfstate'
stages:
#----------------------------------------
#Terraform_install_---------------------
#-------------------------------------------

  - stage: Terraform_Setup_for_Pipline
    #displayName: "Terraform_install_process"
    jobs:
      - job: Terafforminstall
        steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: 'latest'


#----------------------------------------
#Terraform_init_fmt_validate---------------------
#-------------------------------------------            

  - stage: FMT_cmd
    displayName: FMT
    dependsOn: Terraform_Setup_for_Pipline
    jobs:
      - job: FMT_init_validate_cmnd
        steps:
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'custom'
            workingDirectory: '$(WD)'
            outputTo: 'console'
            customCommand: 'fmt'
            environmentServiceNameAzureRM: '$(Svc)'
            environmentAzureRmOverrideSubscriptionID: '$(Sub_Con)'

        - task: TerraformTask@5
          displayName: init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(WD)'
            backendServiceArm: '$(Svc)'
            backendAzureRmOverrideSubscriptionID: '$(Sub_Con)'
            backendAzureRmResourceGroupName: '$(BCRG)'
            backendAzureRmStorageAccountName: '$(BC_STG)'
            backendAzureRmContainerName: '$(BC_Cont)'
            backendAzureRmKey: '$(BC_SF)'

        - task: TerraformTask@5
          displayName: validate
          inputs:
            provider: 'azurerm'
            command: 'validate'
            workingDirectory: '$(WD)'

            

