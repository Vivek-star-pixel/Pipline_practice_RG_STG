trigger: none

pool:
  name: default

variables:
  WD: '$(System.DefaultWorkingDirectory)/env/dev'

  # Service Connection
  Svc: 'vicky-service-connection'
  Sub_Con: '69ba3bc7-f967-4749-bbe8-54cb06e4a54a'

  # Backend Configuration
  BCRG: 'vivek-rg'
  BC_STG: 'vivek12345stg'
  BC_Cont: 'vivekcon1'
  BC_SF: 'terraform123456_pipline.tfstate'

# ==========================================
# Stage 1 - Terraform Setup
# ==========================================

stages:

- stage: Terraform_Setup
  displayName: Terraform Setup

  jobs:
  - job: Install_Terraform

    steps:

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: 'latest'

# ==========================================
# Stage 2 - Terraform Validation & Security
# ==========================================

- stage: Terraform_CI
  displayName: Terraform CI
  dependsOn: Terraform_Setup

  jobs:
  - job: Validation_and_Security

    steps:

    # ---------------------------
    # Terraform fmt
    # ---------------------------

    - task: TerraformTask@5
      displayName: Terraform FMT
      inputs:
        provider: azurerm
        command: custom
        customCommand: fmt
        workingDirectory: $(WD)
        outputTo: console
        environmentServiceNameAzureRM: $(Svc)
        environmentAzureRmOverrideSubscriptionID: $(Sub_Con)

    # ---------------------------
    # Terraform Init
    # ---------------------------

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(WD)

        backendServiceArm: $(Svc)
        backendAzureRmOverrideSubscriptionID: $(Sub_Con)
        backendAzureRmResourceGroupName: $(BCRG)
        backendAzureRmStorageAccountName: $(BC_STG)
        backendAzureRmContainerName: $(BC_Cont)
        backendAzureRmKey: $(BC_SF)

    # ---------------------------
    # Terraform Validate
    # ---------------------------

    - task: TerraformTask@5
      displayName: Terraform Validate
      inputs:
        provider: azurerm
        command: validate
        workingDirectory: $(WD)

    # ---------------------------
    # TFLint
    # Code Quality
    # ---------------------------

    - script: |
        tflint --init
        tflint
      workingDirectory: $(WD)
      displayName: TFLint Scan

    # ---------------------------
    # Checkov
    # IaC Security Scan
    # ---------------------------

    - script: |
        checkov -d .
      workingDirectory: $(WD)
      displayName: Checkov Security Scan

    # ---------------------------
    # Gitleaks
    # Secret Scanning
    # ---------------------------

    - script: |
        gitleaks detect --source .
      displayName: Gitleaks Secret Scan

    # ---------------------------
    # Terraform Plan
    # Dry Run Only
    # ---------------------------

    - task: TerraformTask@5
      displayName: Terraform Plan
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: $(WD)

        environmentServiceNameAzureRM: $(Svc)
        environmentAzureRmOverrideSubscriptionID: $(Sub_Con)